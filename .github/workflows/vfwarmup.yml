name: VFWarmup CI

on:
  push:
    branches: [master]
    paths:
      - 'VFWarmup/**'
      - '.github/workflows/vfwarmup.yml'
  pull_request:
    branches: [master]
    paths:
      - 'VFWarmup/**'
      - '.github/workflows/vfwarmup.yml'

jobs:
  build-glpk:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mpi: [openmpi]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglpk-dev libopenmpi-dev openmpi-bin

      - name: Build VFWarmup (GLPK)
        working-directory: VFWarmup
        run: make glpk GLPKDIR=/usr

      - name: Test VFWarmup (GLPK) — P. putida
        working-directory: VFWarmup
        run: |
          mpirun -np 1 --oversubscribe --bind-to none ./createWarmupPtsGLPK lib/P_Putida.mps 2120

      - name: Validate P. putida output
        working-directory: VFWarmup
        run: |
          test -f lib/P_Putida2120warmup.csv
          NROWS=$(wc -l < lib/P_Putida2120warmup.csv)
          NCOLS=$(head -1 lib/P_Putida2120warmup.csv | tr ',' '\n' | wc -l)
          echo "Output: ${NROWS} rows x ${NCOLS} columns"
          test "$NROWS" -eq 1060
          test "$NCOLS" -eq 2120
          echo "Validation passed"

      - name: Test MPI parallel (2 ranks)
        working-directory: VFWarmup
        run: |
          rm -f lib/P_Putida2120warmup.csv
          mpirun -np 2 --oversubscribe --bind-to none ./createWarmupPtsGLPK lib/P_Putida.mps 2120
          test -f lib/P_Putida2120warmup.csv
          NROWS=$(wc -l < lib/P_Putida2120warmup.csv)
          test "$NROWS" -eq 1060
          echo "MPI parallel test passed"

  fva-validation:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        model: [iJN746, iML1515]
        include:
          - model: iJN746
            name: "P. putida"
          - model: iML1515
            name: "E. coli K12"
    name: FVA validation — ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install C dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglpk-dev libopenmpi-dev openmpi-bin

      - name: Build VFWarmup (GLPK)
        working-directory: VFWarmup
        run: make glpk GLPKDIR=/usr

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install cobra numpy pandas scipy httpx

      - name: Validate FVA against COBRApy — ${{ matrix.name }}
        working-directory: VFWarmup
        run: python test_fva_validation.py ${{ matrix.model }} ./createWarmupPtsGLPK 1e-3
